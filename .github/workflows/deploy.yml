name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_path:
        description: 'Base path for the site (use /<repo>/ for project pages, / for custom domain)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Determine base path
        id: base
        run: |
          INPUT="${{ inputs.base_path }}"
          if [ -z "$INPUT" ]; then
            OWNER="${GITHUB_REPOSITORY%%/*}"
            REPO="${GITHUB_REPOSITORY##*/}"
            echo "base=/$REPO/" >> "$GITHUB_OUTPUT"
            echo "site=https://$OWNER.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base=$INPUT" >> "$GITHUB_OUTPUT"
            echo "site=https://${GITHUB_REPOSITORY%%/*}.github.io" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
          SITE: ${{ steps.base.outputs.site }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4